<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #container {
      position: fixed;
      inset: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    #error {
      display: none;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="error">Unable to load video.</div>
  <script>
    function loadVideo(videoId, autoplayMuted) {
      const container = document.getElementById('container');
      const error = document.getElementById('error');
      container.innerHTML = '';

      if (!videoId) {
        error.style.display = 'block';
        error.textContent = 'Invalid YouTube URL';
        return;
      }

      error.style.display = 'none';

      const origin = window.location.origin || 'https://cumulus.local';
      const params = new URLSearchParams({
        autoplay: '1',
        playsinline: '1',
        controls: '1',
        enablejsapi: '1',
        modestbranding: '1',
        rel: '0',
        mute: autoplayMuted ? '1' : '0',
        origin: origin
      });

      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';

      container.appendChild(iframe);
    }
  </script>
</body>
</html>
