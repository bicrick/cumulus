name: Cumulus
options:
  bundleIdPrefix: com.cumulus
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Cumulus:
    type: application
    platform: macOS
    sources:
      - path: Cumulus
        excludes:
          - Info.plist
    resources:
      - path: Cumulus/Assets.xcassets
      - path: Cumulus/Resources
    settings:
      base:
        INFOPLIST_FILE: Cumulus/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cumulus.app
        CODE_SIGN_ENTITLEMENTS: Cumulus/Cumulus.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Cumulus/Cumulus.entitlements
